<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommender — 个性化电影推荐</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Vintage Cinema / Warm Gold on Dark Navy
   ============================================================ */
:root {
  --bg-deep: #0a0c14;
  --bg-surface: #121624;
  --bg-card: #191d2e;
  --gold: #c9a96e;
  --gold-bright: #e2c48b;
  --gold-dim: #8b7355;
  --text-primary: #ece4d5;
  --text-secondary: #9a9588;
  --text-muted: #5d5a52;
  --accent-red: #a63c3c;
  --accent-green: #4a7c59;
  --accent-blue: #4a6fa5;
  --accent-purple: #7b5ea7;
  --border: #2a2830;
  --radius: 8px;
  --radius-lg: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'DM Mono', monospace;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.06) 0%, transparent 70%),
    radial-gradient(ellipse at 20% 80%, rgba(166,60,60,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 60%, rgba(74,111,165,0.03) 0%, transparent 50%);
  overflow-x: hidden;
}

/* ---------- Animated Background Particles ---------- */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: float-particle 8s infinite ease-in-out;
}

@keyframes float-particle {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

/* ---------- Marquee Header ---------- */
.header {
  text-align: center;
  padding: 60px 24px 40px;
  position: relative;
  z-index: 1;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg,
    transparent 0%, var(--accent-purple) 20%, var(--gold-bright) 50%, var(--accent-blue) 80%, transparent 100%
  );
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.marquee {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  position: relative;
}

.marquee-lights {
  display: flex;
  gap: 8px;
}

.marquee-lights span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: marquee-blink 1.5s ease-in-out infinite;
  box-shadow: 0 0 10px var(--gold);
}

.marquee-lights span:nth-child(1) { animation-delay: 0.0s; background: var(--accent-red); }
.marquee-lights span:nth-child(2) { animation-delay: 0.15s; background: var(--gold); }
.marquee-lights span:nth-child(3) { animation-delay: 0.3s; background: var(--accent-green); }
.marquee-lights span:nth-child(4) { animation-delay: 0.45s; background: var(--gold); }
.marquee-lights span:nth-child(5) { animation-delay: 0.6s; background: var(--accent-blue); }
.marquee-lights span:nth-child(6) { animation-delay: 0.75s; background: var(--gold); }
.marquee-lights span:nth-child(7) { animation-delay: 0.9s; background: var(--accent-purple); }
.marquee-lights span:nth-child(8) { animation-delay: 1.05s; background: var(--gold); }

@keyframes marquee-blink {
  0%, 100% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 5px currentColor; }
  50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 20px currentColor; }
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
  text-shadow: 0 0 60px rgba(201,169,110,0.4);
  line-height: 1.2;
  animation: title-glow 3s ease-in-out infinite alternate;
}

@keyframes title-glow {
  from { filter: drop-shadow(0 0 20px rgba(201,169,110,0.3)); }
  to { filter: drop-shadow(0 0 40px rgba(201,169,110,0.5)); }
}

.header .subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 12px;
  opacity: 0.8;
}

/* ---------- Stats Bar ---------- */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 18px 32px;
  margin: 0 auto 40px;
  max-width: 520px;
  background: linear-gradient(135deg, var(--bg-surface) 0%, rgba(25,29,46,0.8) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-secondary);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.stats-bar .stat {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 12px rgba(74,124,89,0.6);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(74,124,89,0.6); }
  50% { opacity: 0.5; box-shadow: 0 0 20px rgba(74,124,89,0.8); }
}

.stat-value {
  color: var(--text-primary);
  font-weight: 400;
}

/* ---------- Search ---------- */
.search-section {
  text-align: center;
  margin-bottom: 48px;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

.search-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, var(--bg-surface) 0%, rgba(25,29,46,0.9) 100%);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 8px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.search-wrapper:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 40px rgba(201,169,110,0.2), 0 8px 32px rgba(0,0,0,0.4);
  transform: translateY(-2px);
}

.search-input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  padding: 14px 20px;
  width: 280px;
  outline: none;
}

.search-input::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.search-btn {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
  color: var(--bg-deep);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.search-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.5s;
}

.search-btn:hover {
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,169,110,0.4);
}

.search-btn:hover::before {
  left: 100%;
}

.search-btn:active {
  transform: translateY(0);
}

.hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 14px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

/* ---------- States ---------- */
.loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}

.loading .spinner {
  display: inline-block;
  width: 50px; height: 50px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(201,169,110,0.2);
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  animation: pulse-text 1.5s ease-in-out infinite;
}

@keyframes pulse-text {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.error-message {
  text-align: center;
  padding: 40px 24px;
  color: var(--accent-red);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  background: rgba(166,60,60,0.1);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(166,60,60,0.2);
}

.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 4rem;
  margin-bottom: 20px;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.empty-state p {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
}

/* ---------- Results Grid ---------- */
.results {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
  position: relative;
  z-index: 1;
}

.results-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
  position: relative;
}

.results-header::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100px;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.results-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-primary);
}

.results-header .count {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--gold);
  background: rgba(201,169,110,0.1);
  padding: 6px 12px;
  border-radius: 20px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 28px;
}

/* ---------- Movie Card ---------- */
.movie-card {
  background: linear-gradient(145deg, var(--bg-card) 0%, rgba(18,22,36,0.9) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0;
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation: card-enter 0.6s ease-out backwards;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.movie-card:nth-child(1) { animation-delay: 0.05s; }
.movie-card:nth-child(2) { animation-delay: 0.10s; }
.movie-card:nth-child(3) { animation-delay: 0.15s; }
.movie-card:nth-child(4) { animation-delay: 0.20s; }
.movie-card:nth-child(5) { animation-delay: 0.25s; }
.movie-card:nth-child(6) { animation-delay: 0.30s; }
.movie-card:nth-child(7) { animation-delay: 0.35s; }
.movie-card:nth-child(8) { animation-delay: 0.40s; }
.movie-card:nth-child(9) { animation-delay: 0.45s; }
.movie-card:nth-child(10){ animation-delay: 0.50s; }

@keyframes card-enter {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.movie-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--accent-purple) 50%, var(--accent-blue) 100%);
  border-radius: 4px 0 0 4px;
  opacity: 0.8;
  transition: opacity 0.3s;
}

.movie-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.2);
  border-color: rgba(201,169,110,0.4);
}

.movie-card:hover::before {
  opacity: 1;
}

.card-content {
  padding: 24px;
}

.card-rank {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0.6;
}

.card-title {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 12px;
}

/* ---------- Movie Poster ---------- */
.card-poster-container {
  position: relative;
  width: 100%;
  height: 420px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-card) 100%);
}

.card-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s;
}

.movie-card:hover .card-poster {
  transform: scale(1.08);
  filter: brightness(1.15) contrast(1.05);
}

/* Loading state for AI posters */
.card-poster.loading {
  opacity: 0.7;
  animation: pulse-poster 2s ease-in-out infinite;
}

@keyframes pulse-poster {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 0.9; }
}

/* ---------- Default Poster Placeholder ---------- */
.poster-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  position: relative;
  overflow: hidden;
  padding: 20px;
  text-align: center;
}

.poster-placeholder::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 50%);
  animation: rotate-glow 15s linear infinite;
}

@keyframes rotate-glow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.poster-initial {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  font-weight: 800;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  line-height: 1;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.poster-icon {
  font-size: 2.5rem;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
  position: relative;
  z-index: 1;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.poster-year {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.poster-title {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  line-height: 1.3;
  max-width: 90%;
  position: relative;
  z-index: 1;
}

/* ---------- Movie Rating ---------- */
.card-rating {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 10px;
  background: rgba(201,169,110,0.1);
  padding: 4px 10px;
  border-radius: 20px;
}

.rating-star {
  color: var(--gold-bright);
  font-size: 1rem;
}

/* ---------- Genre Tags ---------- */
.card-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.genre-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(201,169,110,0.15) 0%, rgba(139,115,85,0.1) 100%);
  color: var(--gold);
  border: 1px solid rgba(201,169,110,0.2);
  transition: all 0.3s;
}

.genre-tag:hover {
  background: rgba(201,169,110,0.25);
  transform: scale(1.05);
}

/* ---------- Movie Overview ---------- */
.card-overview {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius);
  border-left: 3px solid var(--gold-dim);
}

.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.card-meta .year {
  color: var(--accent-blue);
}

.card-meta .id {
  color: var(--accent-purple);
}

/* ---------- Footer ---------- */
.footer {
  text-align: center;
  padding: 40px 24px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  position: relative;
  z-index: 1;
}

.footer span {
  color: var(--gold);
  font-weight: 600;
}

/* ---------- Quick User Buttons ---------- */
.quick-users {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.quick-user-btn {
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.2);
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
}

.quick-user-btn:hover {
  background: rgba(201,169,110,0.25);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(201,169,110,0.2);
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .header h1 { font-size: 2.2rem; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .search-input { width: 180px; }
  .stats-bar { gap: 20px; font-size: 0.7rem; padding: 14px 20px; }
}

@media (max-width: 480px) {
  .movie-grid { grid-template-columns: 1fr; }
  .search-wrapper { flex-direction: column; gap: 8px; }
  .search-input { width: 100%; }
  .search-btn { width: 100%; }
  .stats-bar { flex-direction: column; gap: 12px; }
}
</style>
</head>
<body>

<!-- ============================================================
     ANIMATED PARTICLES BACKGROUND
     ============================================================ -->
<div class="particles" id="particles"></div>

<!-- ============================================================
     HEADER — Marquee style
     ============================================================ -->
<header class="header">
  <div class="marquee">
    <div class="marquee-lights">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <h1>MOVIE RECOMMENDER</h1>
  <div class="subtitle">Personalized Film Discovery · Powered by Spark ALS</div>
</header>

<!-- ============================================================
     STATS BAR
     ============================================================ -->
<div class="stats-bar" id="statsBar">
  <div class="stat">
    <div class="stat-dot" id="statusDot"></div>
    <span>Status: <span class="stat-value" id="statStatus">--</span></span>
  </div>
  <div class="stat">
    <span>Users: <span class="stat-value" id="statUsers">--</span></span>
  </div>
  <div class="stat">
    <span>Movies: <span class="stat-value" id="statMovies">--</span></span>
  </div>
</div>

<!-- ============================================================
     SEARCH
     ============================================================ -->
<section class="search-section">
  <div class="search-wrapper">
    <input
      type="number"
      class="search-input"
      id="userIdInput"
      placeholder="Enter User ID..."
      min="1"
      autofocus
    >
    <button class="search-btn" id="searchBtn">✨ Get Recommendations</button>
  </div>
  <div class="hint">Try User ID 1–6040 · Press Enter to search</div>
  <div class="quick-users">
    <button class="quick-user-btn" onclick="quickSearch(10)">User 10 ✨</button>
    <button class="quick-user-btn" onclick="quickSearch(50)">User 50 ✨</button>
    <button class="quick-user-btn" onclick="quickSearch(100)">User 100 ✨</button>
    <button class="quick-user-btn" onclick="quickSearch(20)">User 20</button>
    <button class="quick-user-btn" onclick="quickSearch(30)">User 30</button>
  </div>
</section>

<!-- ============================================================
     RESULTS
     ============================================================ -->
<main id="resultsArea" class="results">
  <div class="empty-state">
    <div class="icon">🎬</div>
    <p>Enter a User ID to discover personalized film recommendations</p>
  </div>
</main>

<!-- ============================================================
     FOOTER
     ============================================================ -->
<footer class="footer">
  <p>Spark ALS Collaborative Filtering &nbsp;·&nbsp; MovieLens 1M &nbsp;·&nbsp; <span>movie-recommender</span></p>
</footer>

<script>
/* ============================================================
   APP LOGIC
   ============================================================ */

const API_BASE = '';

const input = document.getElementById('userIdInput');
const button = document.getElementById('searchBtn');
const resultsArea = document.getElementById('resultsArea');

// ---------- Create animated particles ----------
function createParticles() {
  const container = document.getElementById('particles');
  const particleCount = 30;

  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 8 + 's';
    particle.style.animationDuration = (6 + Math.random() * 4) + 's';
    container.appendChild(particle);
  }
}
createParticles();

// ---------- Quick search function ----------
function quickSearch(userId) {
  input.value = userId;
  search(userId);
}

// ---------- Load health stats on page load ----------
(async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const data = await res.json();
    document.getElementById('statStatus').textContent = data.status === 'ok' ? 'Online' : 'Offline';
    document.getElementById('statUsers').textContent = data.users.toLocaleString();
    document.getElementById('statMovies').textContent = data.movies.toLocaleString();
    const dot = document.getElementById('statusDot');
    dot.style.background = data.status === 'ok' ? 'var(--accent-green)' : 'var(--accent-red)';
    dot.style.boxShadow = data.status === 'ok'
      ? '0 0 12px rgba(74,124,89,0.6)'
      : '0 0 12px rgba(166,60,60,0.6)';
  } catch {
    document.getElementById('statStatus').textContent = 'Offline';
    const dot = document.getElementById('statusDot');
    dot.style.background = 'var(--accent-red)';
    dot.style.boxShadow = '0 0 12px rgba(166,60,60,0.6)';
  }
})();

// ---------- Search handler ----------
async function search(userId) {
  if (!userId || userId < 1) {
    resultsArea.innerHTML = '<div class="error-message">⚠️ Please enter a valid User ID (≥ 1)</div>';
    return;
  }

  // Loading state
  resultsArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>Discovering amazing films for you...</p></div>';

  try {
    const res = await fetch(`${API_BASE}/recommend/${userId}?limit=10`);
    if (!res.ok) {
      const err = await res.json();
      resultsArea.innerHTML = `<div class="error-message">❌ ${err.error || 'User not found'}</div>`;
      return;
    }
    const data = await res.json();
    renderResults(data);
  } catch {
    resultsArea.innerHTML = '<div class="error-message">⚠️ Cannot connect to the server. Is app.py running?</div>';
  }
}

// ---------- Generate unique color from string ----------
function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash % 360);
  return `hsl(${hue}, 45%, 25%)`;
}

// ---------- Generate poster placeholder with movie info ----------
function generatePosterPlaceholder(title, genres) {
  // Extract year from title
  const yearMatch = title.match(/\((\d{4})\)/);
  const year = yearMatch ? yearMatch[1] : '';
  const cleanTitle = title.split('(')[0].trim();

  // Get first letter for avatar
  const initial = cleanTitle.charAt(0).toUpperCase();

  // Generate color based on title
  const bgColor = stringToColor(title);
  const accentColor = stringToColor(title + 'accent');

  // Genre icons mapping
  const genreIcons = {
    'Action': '⚔️', 'Adventure': '🗺️', 'Comedy': '😂', 'Drama': '🎭',
    'Horror': '👻', 'Romance': '💕', 'Sci-Fi': '🚀', 'Thriller': '🔪',
    'Animation': '🎨', 'Documentary': '📹', 'Fantasy': '🧙', 'Mystery': '🔍',
    'War': '🎖️', 'Western': '🤠', 'Music': '🎵', 'Crime': '🔫'
  };

  // Get icon based on first genre
  const firstGenre = genres ? genres.split('|')[0] : 'Film';
  const icon = genreIcons[firstGenre] || '🎬';

  return `
    <div class="poster-placeholder" style="background: linear-gradient(145deg, ${bgColor} 0%, ${accentColor} 100%);">
      <div class="poster-initial">${initial}</div>
      <div class="poster-icon">${icon}</div>
      <div class="poster-year">${year}</div>
      <div class="poster-title">${cleanTitle.length > 20 ? cleanTitle.substring(0, 20) + '...' : cleanTitle}</div>
    </div>
  `;
}

// ---------- Handle poster load error ----------
function handlePosterError(img, title, genres) {
  const container = img.parentElement;
  container.innerHTML = generatePosterPlaceholder(title, genres);
}

// ---------- Render ----------
function renderResults(data) {
  const recs = data.recommendations;
  if (!recs || recs.length === 0) {
    resultsArea.innerHTML = '<div class="error-message">No recommendations found for this user.</div>';
    return;
  }

  // Extract year from title like "Movie Title (1999)"
  const yearRe = /\((\d{4})\)$/;

  const cards = recs.map((m, i) => {
    const match = yearRe.exec(m.title);
    const year = match ? match[1] : '';
    const cleanTitle = match ? m.title.slice(0, match.index).trim() : m.title;
    const genres = m.genres || '';
    const genreList = genres.split('|');
    const rating = m.vote_average ? m.vote_average.toFixed(1) : '';
    const overview = m.overview || '';
    const hasPoster = m.poster_url && !m.poster_url.includes('default_poster');

    const posterHtml = hasPoster
      ? `<img src="${m.poster_url}" alt="${cleanTitle}" class="card-poster" onerror="handlePosterError(this, '${m.title.replace(/'/g, "\\'")}', '${genres.replace(/'/g, "\\'")}')">`
      : generatePosterPlaceholder(m.title, genres);

    return `
      <div class="movie-card">
        <div class="card-poster-container">
          ${posterHtml}
        </div>
        <div class="card-content">
          <div class="card-rank">${String(i + 1).padStart(2, '0')}</div>
          <div class="card-title">${cleanTitle}</div>
          ${rating ? `<div class="card-rating"><span class="rating-star">★</span> ${rating}</div>` : ''}
          <div class="card-genres">
            ${genreList.map(g => `<span class="genre-tag">${g}</span>`).join('')}
          </div>
          ${overview ? `<div class="card-overview">${overview}</div>` : ''}
          <div class="card-meta">
            <span class="year">${year || '----'}</span>
            <span class="id">#${m.movieId}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  resultsArea.innerHTML = `
    <div class="results-header">
      <h2>✨ Recommendations</h2>
      <span class="count">User ${data.user_id} · ${recs.length} films</span>
    </div>
    <div class="movie-grid">${cards}</div>
  `;
}

// ---------- Events ----------
button.addEventListener('click', () => search(input.value));
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search(input.value);
});
</script>

</body>
</html>
