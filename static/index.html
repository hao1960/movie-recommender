<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommender — 个性化电影推荐</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Vintage Cinema / Warm Gold on Dark Navy
   ============================================================ */
:root {
  --bg-deep: #0a0c14;
  --bg-surface: #121624;
  --bg-card: #191d2e;
  --gold: #c9a96e;
  --gold-bright: #e2c48b;
  --gold-dim: #8b7355;
  --text-primary: #ece4d5;
  --text-secondary: #9a9588;
  --text-muted: #5d5a52;
  --accent-red: #a63c3c;
  --accent-green: #4a7c59;
  --border: #2a2830;
  --radius: 6px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'DM Mono', monospace;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.04) 0%, transparent 70%),
    radial-gradient(ellipse at 20% 80%, rgba(166,60,60,0.03) 0%, transparent 50%);
}

/* ---------- Marquee Header ---------- */
.header {
  text-align: center;
  padding: 48px 24px 32px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%, var(--gold-dim) 20%, var(--gold-bright) 50%, var(--gold-dim) 80%, transparent 100%
  );
}

.marquee {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  position: relative;
}

.marquee-lights {
  display: flex;
  gap: 6px;
}

.marquee-lights span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: marquee-blink 1.2s ease-in-out infinite;
}

.marquee-lights span:nth-child(1) { animation-delay: 0.0s; }
.marquee-lights span:nth-child(2) { animation-delay: 0.15s; }
.marquee-lights span:nth-child(3) { animation-delay: 0.3s; }
.marquee-lights span:nth-child(4) { animation-delay: 0.45s; }
.marquee-lights span:nth-child(5) { animation-delay: 0.6s; }
.marquee-lights span:nth-child(6) { animation-delay: 0.75s; }
.marquee-lights span:nth-child(7) { animation-delay: 0.9s; }
.marquee-lights span:nth-child(8) { animation-delay: 1.05s; }

@keyframes marquee-blink {
  0%, 100% { opacity: 0.25; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.04em;
  text-shadow: 0 0 40px rgba(201,169,110,0.3);
  line-height: 1.2;
}

.header .subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 8px;
}

/* ---------- Stats Bar ---------- */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 16px 24px;
  margin: 0 auto 32px;
  max-width: 480px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--text-secondary);
}

.stats-bar .stat {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 6px rgba(74,124,89,0.5);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.stat-value {
  color: var(--text-primary);
  font-weight: 400;
}

/* ---------- Search ---------- */
.search-section {
  text-align: center;
  margin-bottom: 40px;
  padding: 0 24px;
}

.search-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 6px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-wrapper:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 24px rgba(201,169,110,0.15);
}

.search-input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  padding: 12px 16px;
  width: 240px;
  outline: none;
}

.search-input::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.search-btn {
  background: var(--gold);
  color: var(--bg-deep);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 12px 28px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.search-btn:hover {
  background: var(--gold-bright);
  transform: translateY(-1px);
}

.search-btn:active {
  transform: translateY(0);
}

.hint {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 10px;
  font-family: 'DM Mono', monospace;
}

/* ---------- States ---------- */
.loading {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.loading .spinner {
  display: inline-block;
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-message {
  text-align: center;
  padding: 32px 24px;
  color: var(--accent-red);
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
}

.empty-state {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state p {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
}

/* ---------- Results Grid ---------- */
.results {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

.results-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.results-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-primary);
}

.results-header .count {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* ---------- Movie Card ---------- */
.movie-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  animation: card-enter 0.5s ease-out backwards;
  overflow: hidden;
}

.movie-card:nth-child(1) { animation-delay: 0.05s; }
.movie-card:nth-child(2) { animation-delay: 0.10s; }
.movie-card:nth-child(3) { animation-delay: 0.15s; }
.movie-card:nth-child(4) { animation-delay: 0.20s; }
.movie-card:nth-child(5) { animation-delay: 0.25s; }
.movie-card:nth-child(6) { animation-delay: 0.30s; }
.movie-card:nth-child(7) { animation-delay: 0.35s; }
.movie-card:nth-child(8) { animation-delay: 0.40s; }
.movie-card:nth-child(9) { animation-delay: 0.45s; }
.movie-card:nth-child(10){ animation-delay: 0.50s; }

@keyframes card-enter {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.movie-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
  border-radius: 3px 0 0 3px;
}

.movie-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.15);
  border-color: rgba(201,169,110,0.3);
}

.card-rank {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--gold);
  opacity: 0.5;
  line-height: 1;
  margin-bottom: 8px;
}

.card-title {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 12px;
}

/* ---------- Genre Tags ---------- */
.card-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.genre-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  background: rgba(201,169,110,0.1);
  color: var(--gold-dim);
  border: 1px solid rgba(201,169,110,0.15);
}

.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ---------- Footer ---------- */
.footer {
  text-align: center;
  padding: 32px 24px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
}

.footer span { color: var(--gold-dim); }

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .header h1 { font-size: 2rem; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .search-input { width: 160px; }
  .stats-bar { gap: 16px; font-size: 0.7rem; }
}

@media (max-width: 480px) {
  .movie-grid { grid-template-columns: 1fr; }
  .search-wrapper { flex-direction: column; gap: 8px; }
  .search-input { width: 100%; }
  .search-btn { width: 100%; }
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER — Marquee style
     ============================================================ -->
<header class="header">
  <div class="marquee">
    <div class="marquee-lights">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <h1>MOVIE RECOMMENDER</h1>
  <div class="subtitle">Personalized Film Discovery · Powered by ALS</div>
</header>

<!-- ============================================================
     STATS BAR
     ============================================================ -->
<div class="stats-bar" id="statsBar">
  <div class="stat">
    <div class="stat-dot" id="statusDot"></div>
    <span>Status: <span class="stat-value" id="statStatus">--</span></span>
  </div>
  <div class="stat">
    <span>Users: <span class="stat-value" id="statUsers">--</span></span>
  </div>
  <div class="stat">
    <span>Movies: <span class="stat-value" id="statMovies">--</span></span>
  </div>
</div>

<!-- ============================================================
     SEARCH
     ============================================================ -->
<section class="search-section">
  <div class="search-wrapper">
    <input
      type="number"
      class="search-input"
      id="userIdInput"
      placeholder="Enter User ID..."
      min="1"
      autofocus
    >
    <button class="search-btn" id="searchBtn">Get Recommendations</button>
  </div>
  <div class="hint">Try User ID 1–6040 · Press Enter to search</div>
</section>

<!-- ============================================================
     RESULTS
     ============================================================ -->
<main id="resultsArea" class="results">
  <div class="empty-state">
    <div class="icon">🎬</div>
    <p>Enter a User ID to discover personalized film recommendations</p>
  </div>
</main>

<!-- ============================================================
     FOOTER
     ============================================================ -->
<footer class="footer">
  <p>Spark ALS Collaborative Filtering &nbsp;·&nbsp; MovieLens 1M &nbsp;·&nbsp; <span>movie-recommender</span></p>
</footer>

<script>
/* ============================================================
   APP LOGIC
   ============================================================ */

const API_BASE = '';

const input = document.getElementById('userIdInput');
const button = document.getElementById('searchBtn');
const resultsArea = document.getElementById('resultsArea');

// ---------- Load health stats on page load ----------
(async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const data = await res.json();
    document.getElementById('statStatus').textContent = data.status === 'ok' ? 'Online' : 'Offline';
    document.getElementById('statUsers').textContent = data.users.toLocaleString();
    document.getElementById('statMovies').textContent = data.movies.toLocaleString();
    const dot = document.getElementById('statusDot');
    dot.style.background = data.status === 'ok' ? 'var(--accent-green)' : 'var(--accent-red)';
    dot.style.boxShadow = data.status === 'ok'
      ? '0 0 6px rgba(74,124,89,0.5)'
      : '0 0 6px rgba(166,60,60,0.5)';
  } catch {
    document.getElementById('statStatus').textContent = 'Offline';
    const dot = document.getElementById('statusDot');
    dot.style.background = 'var(--accent-red)';
    dot.style.boxShadow = '0 0 6px rgba(166,60,60,0.5)';
  }
})();

// ---------- Search handler ----------
async function search(userId) {
  if (!userId || userId < 1) {
    resultsArea.innerHTML = '<div class="error-message">Please enter a valid User ID (≥ 1)</div>';
    return;
  }

  // Loading state
  resultsArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading recommendations…</p></div>';

  try {
    const res = await fetch(`${API_BASE}/recommend/${userId}?limit=10`);
    if (!res.ok) {
      const err = await res.json();
      resultsArea.innerHTML = `<div class="error-message">${err.error || 'User not found'}</div>`;
      return;
    }
    const data = await res.json();
    renderResults(data);
  } catch {
    resultsArea.innerHTML = '<div class="error-message">Cannot connect to the server. Is app.py running?</div>';
  }
}

// ---------- Render ----------
function renderResults(data) {
  const recs = data.recommendations;
  if (!recs || recs.length === 0) {
    resultsArea.innerHTML = '<div class="error-message">No recommendations found for this user.</div>';
    return;
  }

  // Extract year from title like "Movie Title (1999)"
  const yearRe = /\((\d{4})\)$/;

  const cards = recs.map((m, i) => {
    const match = yearRe.exec(m.title);
    const year = match ? match[1] : '';
    const cleanTitle = match ? m.title.slice(0, match.index).trim() : m.title;
    const genres = m.genres ? m.genres.split('|') : [];

    return `
      <div class="movie-card">
        <div class="card-rank">${String(i + 1).padStart(2, '0')}</div>
        <div class="card-title">${cleanTitle}</div>
        <div class="card-genres">
          ${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
        </div>
        <div class="card-meta">
          <span>${year || '----'}</span>
          <span>#${m.movieId}</span>
        </div>
      </div>
    `;
  }).join('');

  resultsArea.innerHTML = `
    <div class="results-header">
      <h2>Recommendations</h2>
      <span class="count">User ${data.user_id} · ${recs.length} films</span>
    </div>
    <div class="movie-grid">${cards}</div>
  `;
}

// ---------- Events ----------
button.addEventListener('click', () => search(input.value));
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search(input.value);
});
</script>

</body>
</html>
